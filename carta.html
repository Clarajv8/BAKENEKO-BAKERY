<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Invocación Completada | Bakeneko Bakery</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Zen+Kaku+Gothic+New:wght@300;500&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/carta.css">
</head>
<body class="card-reveal-page">

    <div class="noise-overlay"></div>

    <nav class="main-nav minimal-nav">
        <a href="index.html" class="logo">化け猫 <span class="sub">Bakery</span></a>
    </nav>

    <main class="reveal-stage">
        
        <div class="reveal-header">
            <span class="magic-seal" id="yokai-kanji">霊</span>
            <h1 class="tiny-title" data-i18n="revealTitle">Espíritu Invocado</h1>
            <p class="compact-p" id="collection-status">Esta carta ha sido añadida a tu Grimorio personal.</p>
        </div>

        <div class="card-showcase">
            <div class="card-3d-wrapper" id="card-element">
                <img src="" alt="Carta Yokai" id="card-image" class="yokai-card-img hidden">
                <div class="card-glow"></div>
            </div>
        </div>

        <div class="yokai-lore">
            <h2 id="yokai-name" class="lore-title">Cargando...</h2>
            <h3 id="yokai-title" class="lore-subtitle">...</h3>
            <p id="yokai-desc" class="lore-text"></p>
        </div>

        <div class="reveal-actions">
            <a href="shop.html" class="cta-btn return-btn">Volver al Grimorio</a>
        </div>

    </main>

    <div id="particles-container"></div>

    <div id="neo-cursor"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="js/carta.js"></script>
</body>
</html>
