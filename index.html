<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakeneko Bakery | Portal al Reino Yokai</title>
    <link rel="stylesheet" href="css/landing.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;500&family=Noto+Serif+JP:wght@200;700&display=swap" rel="stylesheet">
</head>
<body class="landing-page">

    <div class="landing-bg">
        <video autoplay muted loop playsinline class="bg-video">
            <source src="assets/video/clouds-loop.mp4" type="video/mp4">
        </video>
        <div class="bg-overlay"></div>
    </div>

    <nav class="corner-nav">
        <div class="nav-corner top-left">
            <button id="lang-toggle" class="nav-link">ES / EN / JP</button>
        </div>

        <div class="nav-corner top-right">
            <a href="shop.html#concepto" class="nav-link" data-i18n="navConcept">CONCEPTO</a>
        </div>

        <div class="nav-corner bottom-left">
            <a href="shop.html#redes" class="nav-link" data-i18n="navSocial">REDES</a>
        </div>

        <div class="nav-corner bottom-right">
            <a href="shop.html" class="enter-btn">
                <span class="btn-text" data-i18n="enterShop">ENTRAR AL GRIMORIO</span>
            </a>
        </div>
    </nav>

    <div class="landing-center">
        <h1 class="main-logo">
            <span class="kanji">化け猫</span>
            <span class="latin">BAKENEKO <small>Bakery</small></span>
        </h1>
        <p class="tagline" data-i18n="introTitle">Dulzura Entre Mundos</p>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
